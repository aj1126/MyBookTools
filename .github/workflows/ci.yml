name: MyBookTools CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install Pester
      shell: pwsh
      run: Install-Module Pester -Force -Scope CurrentUser

    - name: Run Tests with Coverage
      shell: pwsh
      run: |
        Invoke-Pester -Path tests `
          -Output Detailed `
          -CodeCoverage src/MyBookTools.psm1 `
          -PassThru | Tee-Object -Variable result | Out-Null
        $coverage = $result.CodeCoverage
        Write-Host "Coverage: $($coverage.CoveragePercent)%"
